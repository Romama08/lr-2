<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Деталі події | OnlineTickets</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">OnlineTickets</div>
        <nav>
            <a href="index.html" class="back-link">← Назад до списку</a>
        </nav>
    </header>

    <main class="details-main">
        <h1 id="det-title">Завантаження...</h1>
        
        <div class="details-image-container">
            <img id="det-image" src="" alt="Подія">
        </div>
        
        <div class="details-description">
            <h3>Про подію</h3>
            <p id="det-description"></p>
        </div>

        <div class="details-info">
            <p>📅 <span id="det-date"></span> | 📍 <span id="det-location"></span></p>
            <h2 id="det-price"></h2>
        </div>

        <button id="buy-ticket-btn" class="buy-now-btn">Купити квиток</button>

        <section id="checkout-section" class="checkout-form-container" style="display: none;">
            <h3>Оформлення замовлення</h3>
            <div class="form-group">
                <input type="text" id="user-name" placeholder="Ваше ім'я">
            </div>
            <div class="form-group">
                <input type="email" id="user-email" placeholder="Ваш Email (обов'язково з @)">
            </div>
            <button id="confirm-booking-btn" class="confirm-btn">Підтвердити замовлення</button>
            <p id="details-form-msg"></p>
        </section>
    </main>

    <script src="js/details.js"></script>
</body>
</html>
